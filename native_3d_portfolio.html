<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Beyond 3D Portfolio</title>
    <style>
        :root {
            --blending-color: #0b22e1; /* Electric Blue initially */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            
            --scroll-progress: 0;
            --mouse-x: 0;
            --mouse-y: 0;
            
            --world-z: 0px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #050510;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            height: 400vh; /* Allow scrolling */
            transition: background-color 1s ease;
        }
        
        /* The Background Color Layer */
        #bg-visualizer {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, var(--blending-color) 0%, #050510 60%);
            opacity: 0.3;
            z-index: -2;
            transition: background 1s ease;
            pointer-events: none;
        }

        /* 3D Viewport */
        #viewport {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
            pointer-events: none; /* Let clicks pass through if needed, but we will make interactive elements auto */
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The 3D World Container */
        #world {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            /* Combine world Z translation (scroll) with mouse tilt */
            transform: translateZ(var(--world-z)) rotateX(calc(var(--mouse-y) * -10deg)) rotateY(calc(var(--mouse-x) * 10deg));
            will-change: transform;
        }

        /* Glassmorphism utility */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            color: #fff;
        }

        /* Portrait Element */
        .portrait-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(0px); /* Base level */
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }

        .portrait {
            width: 300px;
            height: 400px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        .portrait img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Drop shadow for cut-out feel */
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        /* Bento Grid Cards positioned in the Z-Tunnel */
        .project-card {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            pointer-events: auto; /* Clickable */
            transition: transform 0.3s ease, border-color 0.3s;
            cursor: pointer;
        }
        
        .project-card:hover {
            border-color: rgba(255,255,255,0.4);
        }

        .project-card h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .project-card p {
            color: #a1a1aa;
            font-size: 0.95rem;
        }

        /* Specific Project Positions */
        #project-1 {
            /* Construction Tracking */
            transform: translate(-120%, -50%) translateZ(-800px);
        }

        #project-2 {
            /* Retail Accounting */
            transform: translate(20%, -100%) translateZ(-1600px);
        }

        #project-3 {
            /* Election Prediction */
            transform: translate(-80%, 30%) translateZ(-2400px);
        }

        /* Tech Icons 3D Grid */
        #tech-grid {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 400px;
            transform: translate(-50%, -50%) translateZ(-3400px);
            transform-style: preserve-3d;
        }
        
        .tech-icon {
            position: absolute;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            border-radius: 20px;
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            opacity: 0;
        }

        /* Hidden scroll sections to track progress via IntersectionObserver */
        .scroll-trigger {
            height: 100vh;
            width: 100%;
            visibility: hidden;
            pointer-events: none;
        }

        /* STATE CLASSES */
        /* 25% scrolled: Portrait rotates */
        .state-rotated .portrait-container {
            transform: translate(-120%, -50%) translateZ(200px) rotateY(45deg);
        }
        
        /* 75% scrolled: Tech grid assembles */
        .state-assembled .tech-icon {
            opacity: 1;
        }
        .state-assembled #icon-flutter { transform: translate(-200px, -100px) translateZ(100px); }
        .state-assembled #icon-node    { transform: translate(100px, -150px) translateZ(200px); }
        .state-assembled #icon-firebase{ transform: translate(150px, 100px)  translateZ(-50px); }

    </style>
</head>
<body>

    <!-- Dynamic Background Color Shift -->
    <div id="bg-visualizer"></div>

    <!-- Dummy elements for intersection observation -->
    <div id="triggers">
        <div class="scroll-trigger" data-section="0"></div>
        <div class="scroll-trigger" data-section="1"></div>
        <div class="scroll-trigger" data-section="2"></div>
        <div class="scroll-trigger" data-section="3"></div>
    </div>

    <!-- 3D Canvas -->
    <div id="viewport">
        <div id="world">
            
            <!-- Anchor Portrait -->
            <div class="portrait-container" id="main-portrait">
                <div class="portrait glass" style="background: transparent; border: none; box-shadow: none;">
                    <img src="https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?q=80&w=600&auto=format&fit=crop" alt="Creative Portrait" />
                </div>
            </div>

            <!-- 3D Tunnel Bento Projects -->
            <div class="project-card glass" id="project-1">
                <h3>Construction Tracking</h3>
                <p>Real-time analytics and structural progression tracking dashboard.</p>
            </div>

            <div class="project-card glass" id="project-2">
                <h3>Retail Accounting</h3>
                <p>Automated ledger reconciliations with machine learning insights.</p>
            </div>

            <div class="project-card glass" id="project-3">
                <h3>Election Prediction</h3>
                <p>Interactive data visualization mapped dynamically strictly in GLSL.</p>
            </div>

            <!-- Tech Icons -->
            <div id="tech-grid">
                <div class="tech-icon glass" id="icon-flutter" style="transform: translate(0,0) translateZ(-500px);">Flutter</div>
                <div class="tech-icon glass" id="icon-node" style="transform: translate(0,0) translateZ(-500px);">Node.js</div>
                <div class="tech-icon glass" id="icon-firebase" style="transform: translate(0,0) translateZ(-500px);">Firebase</div>
            </div>

        </div>
    </div>

    <script>
        // DOM Elements
        const world = document.getElementById('world');
        const root = document.documentElement;
        const bgVisualizer = document.getElementById('bg-visualizer');
        const triggers = document.querySelectorAll('.scroll-trigger');

        // State Tracking
        let currentScrollY = window.scrollY;
        let targetWorldZ = 0;
        let currentWorldZ = 0;
        
        let mouseX = 0, targetMouseX = 0;
        let mouseY = 0, targetMouseY = 0;

        // 1. HIGH-PERFORMANCE RENDER LOOP (requestAnimationFrame + lerp)
        function render() {
            // Lerp Mouse (Parallax)
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;
            root.style.setProperty('--mouse-x', mouseX);
            root.style.setProperty('--mouse-y', mouseY);

            // Lerp Scroll Z-Depth (Fly-through transition)
            currentWorldZ += (targetWorldZ - currentWorldZ) * 0.08;
            root.style.setProperty('--world-z', `${currentWorldZ}px`);

            requestAnimationFrame(render);
        }
        render();

        // 2. MOUSE TRACKING
        window.addEventListener('mousemove', (e) => {
            // Normalize -1 to 1
            targetMouseX = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouseY = (e.clientY / window.innerHeight) * 2 - 1;
        });

        // 3. SCROLL PROGRESS (To map Tunnel Z-Depth)
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const maxScroll = document.body.scrollHeight - window.innerHeight;
            const scrollFraction = Math.max(0, Math.min(1, scrollTop / maxScroll));
            
            // Map scroll fraction to Z depth (0 to 3500px)
            // As we scroll down, world moves positively in Z, bringing negative Z items forward
            targetWorldZ = scrollFraction * 3600; 

            // State Based Custom Transitions mapped by pure Scroll Fraction 
            // Fallback for strict state checks (combining IO and continuous scroll):
            if (scrollFraction > 0.15) {
                document.body.classList.add('state-rotated');
            } else {
                document.body.classList.remove('state-rotated');
            }

            if (scrollFraction > 0.45) {
                root.style.setProperty('--blending-color', '#6b21a8'); // Deep Purple
            } else {
                root.style.setProperty('--blending-color', '#0b22e1'); // Electric Blue
            }

            if (scrollFraction > 0.70) {
                document.body.classList.add('state-assembled');
            } else {
                document.body.classList.remove('state-assembled');
            }
        }, { passive: true });

        // 4. INTERSECTION OBSERVER
        // Used to track which specific "section" index we are looking at.
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const sectionId = entry.target.getAttribute('data-section');
                    // We can augment specific CSS classes or states based on the activated section.
                    // E.g. console.log("Entered Section: ", sectionId);
                }
            });
        }, { threshold: 0.5 });

        triggers.forEach(trigger => observer.observe(trigger));
        
        // Trigger initial scroll calculation
        window.dispatchEvent(new Event('scroll'));

    </script>
</body>
</html>
